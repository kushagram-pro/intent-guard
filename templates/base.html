<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Intent Guard</title>
    <meta name="description" content="Intent Guard is a financial intent safety engine that sits between user instructions and trading execution.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg width='128' height='128' viewBox='0 0 128 128' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23fb923c'/%3E%3Cstop offset='1' stop-color='%23f97316'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect rx='32' ry='32' width='128' height='128' fill='url(%23g)'/%3E%3Cpath d='M34 64c0-16.6 13.4-30 30-30s30 13.4 30 30-13.4 30-30 30H46' fill='none' stroke='%23fff' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M46 78V50l16 14 16-14v28' fill='none' stroke='%23fff' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/site.css') }}">
</head>
<body class="{{ body_class|default('') }}">
    <header class="global-nav">
        <div class="global-nav-inner">
            <a href="/" class="nav-brand">
                <span class="brand-mark">IG</span>
                <div class="brand-text">
                    <span class="eyebrow">Financial Intent Safety</span>
                    <strong>Intent Guard</strong>
                </div>
            </a>
            <nav class="global-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/openclaw">OpenClaw</a>
                <a href="/signup">Sign Up</a>
                <a href="/login">Login</a>
            </nav>
        </div>
    </header>

    <div id="toast-root" aria-live="polite" aria-atomic="true"></div>

    {% block content %}{% endblock %}
    <script src="{{ url_for('static', path='/js/app.js') }}" defer></script>
</body>
</html>
