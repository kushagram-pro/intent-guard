{% extends "base.html" %}
{% set body_class = "auth-body" %}
{% block content %}
<div class="auth-layout">
    <section class="auth-copy">
        <p class="eyebrow">Create account</p>
        <h1>Sign up for Intent Guard</h1>
        <p>Create a local account for the dashboard. After that, sign in with the same email and password.</p>
    </section>

    <section class="auth-panel">
        <form id="signup-form" class="stack-form">
            <label>
                <span>Full name</span>
                <input type="text" name="name" placeholder="Alex Trader" required>
            </label>
            <label>
                <span>Email</span>
                <input type="email" name="username" placeholder="alex@example.com" required>
            </label>
            <label>
                <span>Password</span>
                <input type="password" name="password" placeholder="At least 8 characters" required minlength="8">
            </label>
            <button type="submit" class="primary-button">Create account</button>
            <p class="form-hint">Already have an account? <a href="/login">Sign in</a>.</p>
            <p class="form-error" data-role="form-error"></p>
        </form>
    </section>
</div>
{% endblock %}
